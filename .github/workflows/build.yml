name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Nova Launcher ${{ github.ref_name }}
          body: |
            ## Nova Launcher ${{ github.ref_name }}

            ### What's new
            - Resource Pack browser — search and install from Modrinth
            - Shader Pack browser — search and install from Modrinth
            - Auto-updater — download and install new versions directly from the launcher
            - New logo
            - Bug fixes

            > Windows SmartScreen uyarısı çıkarsa: **Daha fazla bilgi → Yine de çalıştır**
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}